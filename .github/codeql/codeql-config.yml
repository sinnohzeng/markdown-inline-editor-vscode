# Code scanning: exclude vendored Mermaid bundles (third-party, minified) and all test code.
# Test layout: Jest under **/__tests__/**, e2e/mocks under src/test/** (see PR #61), *.test.ts/js.
# See https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
name: Markdown Inline Editor CodeQL config

paths-ignore:
  - assets/mermaid/**
  - "**/__tests__/**"
  - src/test/**
  - "**/*.test.ts"
  - "**/*.test.js"
