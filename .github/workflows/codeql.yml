# CodeQL Advanced setup with custom config (excludes assets/mermaid/**, tests: **/__tests__/**, src/test/**, **/*.test.ts/js).
#
# REQUIRED: Turn OFF "Default setup" for Code Scanning, or SARIF upload fails with:
# "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"
# Repo: Settings → Code security → Code scanning → disable Default / use Advanced only.
name: Code security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
