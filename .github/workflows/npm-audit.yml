# Dedicated workflow for npm dependency vulnerability checks.
# Status badge (passing / failing) reflects whether high-or-worse advisories are present.
# README: https://docs.github.com/en/actions/how-tos/monitor-workflows/add-a-status-badge
name: Dependency health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly check even if there are no pushes (lockfile / registry advisories change)
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (fail on high or critical)
        run: npm audit --audit-level=high
